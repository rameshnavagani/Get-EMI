<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Get EMI Calculator | Loan EMI Calculator Online India</title>

<style>
:root{
--bg:#1A2849;
--text:#ffffff;
--btn:#ffffff;
--btnText:#1A2849;
--inputBg:#1A2849;
--border:#ffffff;
}

body.light{
--bg:#ffffff;
--text:#1A2849;
--btn:#1A2849;
--btnText:#ffffff;
--inputBg:transparent;
--border:#1A2849;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:var(--bg);
color:var(--text);
}

.container{
max-width:420px;
width:100%;
margin:auto;
padding:15px;
box-sizing:border-box;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding-bottom:10px;
margin-bottom:18px;
border-bottom:1px solid rgba(255,255,255,0.15);
}

.title{
font-size:24px;
font-weight:bold;
}

.switch{
position:relative;
width:74px;
height:30px;
}

.switch input{ display:none; }

.slider{
position:absolute;
width:100%;
height:100%;
background:var(--btn);
border-radius:20px;
display:flex;
align-items:center;
font-size:11px;
font-weight:bold;
color:var(--btnText);
padding-left:28px;
box-sizing:border-box;
}

.slider:before{
content:"";
position:absolute;
height:22px;
width:22px;
left:4px;
background:var(--bg);
border-radius:50%;
transition:.3s;
}

.switch input:checked + .slider{
padding-left:8px;
justify-content:flex-start;
}

.switch input:checked + .slider:before{
transform:translateX(40px);
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 0;
}

.row input{
width:170px;
padding:10px;
border-radius:6px;
border:2px solid var(--border);
background:var(--inputBg);
color:var(--text);
text-align:right;
font-size:16px;
}

.btn-row{
display:flex;
gap:10px;
margin-top:10px;
}

.btn-row button{
flex:1;
padding:14px;
background:var(--btn);
color:var(--btnText);
border:none;
font-size:12px;
font-weight:bold;
border-radius:10px;
cursor:pointer;
}

.result{
text-align:center;
margin-top:15px;
font-size:22px;
}

.info{
margin-top:10px;
line-height:24px;
font-size:15px;
}

.amortization{
margin-top:15px;
font-size:14px;
line-height:22px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="title">Get EMI</div>

<label class="switch">
<input type="checkbox" id="modeToggle">
<span class="slider" id="modeText">Dark</span>
</label>
</div>

<div class="row">
<label>Loan Amount</label>
<input type="number" id="loan">
</div>

<div class="row">
<label>Rate %</label>
<input type="number" id="rate">
</div>

<div class="row">
<label>Tenure (Months)</label>
<input type="number" id="tenure">
</div>

<div class="btn-row">
<button id="calcBtn">CALCULATE EMI</button>
<button id="chartBtn">AMORTIZATION CHART</button>
<button id="resetBtn">RESET</button>
</div>

<div class="result" id="emiResult">
Enter loan details and click Calculate EMI
</div>

<div class="info">
<div>Total Amount Paying : ₹ <span id="total">0</span></div>
<div>Total Interest Paying : ₹ <span id="interest">0</span></div>
<div>Effective Rate p.a (Flat) : <span id="flatPa">0</span>%</div>
<div>Effective Rate p.m : <span id="pm">0</span>%</div>
</div>

<div id="amortization" class="amortization"></div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

document.getElementById("calcBtn").addEventListener("click", calculateEMI);
document.getElementById("chartBtn").addEventListener("click", showAmortization);
document.getElementById("resetBtn").addEventListener("click", resetAll);
document.getElementById("modeToggle").addEventListener("change", toggleMode);

});

function toggleMode(){
document.body.classList.toggle("light");
document.getElementById("modeText").innerHTML =
document.body.classList.contains("light") ? "Light" : "Dark";
}

function calculateEMI(){

const loan = parseFloat(document.getElementById("loan").value);
const rate = parseFloat(document.getElementById("rate").value);
const tenure = parseFloat(document.getElementById("tenure").value);

if(!loan || !rate || !tenure){
document.getElementById("emiResult").innerHTML="Please enter all values";
return;
}

const r = rate/12/100;

const emi = loan*r*Math.pow(1+r,tenure)/(Math.pow(1+r,tenure)-1);

const total = emi*tenure;
const interest = total-loan;

const years = tenure/12;
const flatRate = (interest/(loan*years))*100;

document.getElementById("emiResult").innerHTML="Loan EMI is ₹ "+emi.toFixed(2);
document.getElementById("total").innerHTML=total.toFixed(2);
document.getElementById("interest").innerHTML=interest.toFixed(2);
document.getElementById("flatPa").innerHTML=flatRate.toFixed(2);
document.getElementById("pm").innerHTML=(r*100).toFixed(2);
}

function showAmortization(){

calculateEMI();

const loanVal=parseFloat(document.getElementById("loan").value);
const rateVal=parseFloat(document.getElementById("rate").value);
const tenureVal=parseFloat(document.getElementById("tenure").value);

if(!loanVal || !rateVal || !tenureVal) return;

const r=rateVal/12/100;
const emi=loanVal*r*Math.pow(1+r,tenureVal)/(Math.pow(1+r,tenureVal)-1);

let balance=loanVal;

let html="<b>Amortization Schedule</b><br><br>";

for(let i=1;i<=tenureVal;i++){

let interestVal=balance*r;
let principal=emi-interestVal;
balance=balance-principal;

html+=`
<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.2)">
<span>${i}</span>
<span>₹${emi.toFixed(0)}</span>
<span>₹${interestVal.toFixed(0)}</span>
<span>₹${principal.toFixed(0)}</span>
</div>`;
}

document.getElementById("amortization").innerHTML=html;
}

function resetAll(){

document.getElementById("loan").value="";
document.getElementById("rate").value="";
document.getElementById("tenure").value="";

document.getElementById("emiResult").innerHTML=
"Enter loan details and click Calculate EMI";

document.getElementById("total").innerHTML="0";
document.getElementById("interest").innerHTML="0";
document.getElementById("flatPa").innerHTML="0";
document.getElementById("pm").innerHTML="0";
document.getElementById("amortization").innerHTML="";

}

</script>

</body>
</html>
