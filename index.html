<!DOCTYPE html>
<html lang="en">
<head>

<meta name="google-site-verification" content="41q-fGa3V0AIcuARLMLExtk_qI2PrbtaT_oHS7y11Mw" />

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>EMI Calculator Online | Loan EMI Calculator 2026 India | Home Car Personal Loan EMI</title>

<style>
:root{
--bg:#1A2849;
--text:#ffffff;
--btn:#ffffff;
--btnText:#1A2849;
--inputBg:#1A2849;
--border:#ffffff;
}

body.light{
--bg:#ffffff;
--text:#1A2849;
--btn:#1A2849;
--btnText:#ffffff;
--inputBg:transparent;
--border:#1A2849;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:var(--bg);
color:var(--text);
}

/* BOARDER COVER */
.board{
max-width:450px;
margin:15px auto;
border:3px solid var(--border);
border-radius:14px;
padding:15px;
box-sizing:border-box;
}

/* FIXED HEADER */
.header{
position:sticky;
top:0;
background:var(--bg);
z-index:100;
display:flex;
justify-content:space-between;
align-items:center;
padding-bottom:10px;
margin-bottom:10px;
border-bottom:1px solid rgba(255,255,255,0.15);
}

.title{
font-size:24px;
font-weight:bold;
}

.switch{
position:relative;
width:74px;
height:30px;
}

.switch input{ display:none; }

.slider{
position:absolute;
width:100%;
height:100%;
background:var(--btn);
border-radius:20px;
display:flex;
align-items:center;
font-size:11px;
font-weight:bold;
color:var(--btnText);
padding-left:28px;
box-sizing:border-box;
}

.slider:before{
content:"";
position:absolute;
height:22px;
width:22px;
left:4px;
background:var(--bg);
border-radius:50%;
transition:.3s;
}

.switch input:checked + .slider{
padding-left:8px;
justify-content:flex-start;
}

.switch input:checked + .slider:before{
transform:translateX(40px);
}

/* RATE MODE BUTTONS */
.rate-toggle{
display:flex;
gap:10px;
margin:10px 0 15px 0;
}

.rate-toggle button{
flex:1;
padding:10px;
border-radius:10px;
border:2px solid var(--border);
background:transparent;
color:var(--text);
font-weight:bold;
cursor:pointer;
}

.rate-toggle button.active{
background:var(--btn);
color:var(--btnText);
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 0;
}

.row input{
width:170px;
padding:10px;
border-radius:6px;
border:2px solid var(--border);
background:var(--inputBg);
color:var(--text);
text-align:right;
font-size:16px;
}

.btn-row{
display:flex;
gap:10px;
margin-top:10px;
}

.btn-row button{
flex:1;
padding:14px;
background:var(--btn);
color:var(--btnText);
border:none;
font-size:12px;
font-weight:bold;
border-radius:10px;
cursor:pointer;
}

.result{
text-align:center;
margin-top:15px;
font-size:22px;
}

.info{
margin-top:10px;
line-height:24px;
font-size:15px;
}

.amortization{
margin-top:15px;
font-size:14px;
line-height:22px;
}
</style>
</head>

<body>

<div class="board">

<div class="header">
<div class="title">EMI Calculator Online</div>

<label class="switch">
<input type="checkbox" id="modeToggle">
<span class="slider" id="modeText">Dark</span>
</label>
</div>

<!-- NEW RATE TOGGLE -->
<div class="rate-toggle">
<button id="reducingBtn" class="active">Reducing Rate</button>
<button id="flatBtn">Flat Rate</button>
</div>

<div class="row">
<label>Loan Amount</label>
<input type="number" id="loan">
</div>

<div class="row">
<label>Rate %</label>
<input type="number" id="rate">
</div>

<div class="row">
<label>Tenure (Months)</label>
<input type="number" id="tenure">
</div>

<div class="btn-row">
<button id="calcBtn">CALCULATE EMI</button>
<button id="chartBtn">AMORTIZATION CHART</button>
<button id="resetBtn">RESET</button>
</div>

<div class="result" id="emiResult">
Enter loan details and click Calculate EMI
</div>

<div class="info">
<div>Total Amount Paying : ₹ <span id="total">0</span></div>
<div>Total Interest Paying : ₹ <span id="interest">0</span></div>
<div>Effective Rate p.a (Flat) : <span id="flatPa">0</span>%</div>
<div>Effective Rate p.m : <span id="pm">0</span>%</div>
</div>

<div id="amortization" class="amortization"></div>

</div>

<script>

let rateMode="reducing";

document.addEventListener("DOMContentLoaded", function(){

document.getElementById("calcBtn").addEventListener("click", calculateEMI);
document.getElementById("chartBtn").addEventListener("click", showAmortization);
document.getElementById("resetBtn").addEventListener("click", resetAll);
document.getElementById("modeToggle").addEventListener("change", toggleMode);

document.getElementById("reducingBtn").onclick=()=>{
rateMode="reducing";
setActive()
}

document.getElementById("flatBtn").onclick=()=>{
rateMode="flat";
setActive()
}

});

function setActive(){
document.getElementById("reducingBtn").classList.toggle("active",rateMode==="reducing");
document.getElementById("flatBtn").classList.toggle("active",rateMode==="flat");
}

function toggleMode(){
document.body.classList.toggle("light");
document.getElementById("modeText").innerHTML =
document.body.classList.contains("light") ? "Light" : "Dark";
}

function calculateEMI(){

const loan = parseFloat(document.getElementById("loan").value);
const rate = parseFloat(document.getElementById("rate").value);
const tenure = parseFloat(document.getElementById("tenure").value);

if(!loan || !rate || !tenure){
document.getElementById("emiResult").innerHTML="Please enter all values";
return;
}

let emi,total,interest,flatRate;

if(rateMode==="reducing"){

const r = rate/12/100;

emi = loan*r*Math.pow(1+r,tenure)/(Math.pow(1+r,tenure)-1);

total = emi*tenure;
interest = total-loan;

flatRate = (interest/(loan*(tenure/12)))*100;

document.getElementById("pm").innerHTML=(r*100).toFixed(2);

}
else{

const interestTotal = loan*(rate/100)*(tenure/12);

total = loan+interestTotal;
emi = total/tenure;
interest = interestTotal;

flatRate = rate;

document.getElementById("pm").innerHTML=(rate/12).toFixed(2);

}

document.getElementById("emiResult").innerHTML="Loan EMI is ₹ "+emi.toFixed(2);
document.getElementById("total").innerHTML=total.toFixed(2);
document.getElementById("interest").innerHTML=interest.toFixed(2);
document.getElementById("flatPa").innerHTML=flatRate.toFixed(2);

}

function showAmortization(){

if(rateMode==="flat"){
document.getElementById("amortization").innerHTML=
"Amortization available only for reducing rate";
return;
}

calculateEMI();

const loanVal=parseFloat(document.getElementById("loan").value);
const rateVal=parseFloat(document.getElementById("rate").value);
const tenureVal=parseFloat(document.getElementById("tenure").value);

const r=rateVal/12/100;
const emi=loanVal*r*Math.pow(1+r,tenureVal)/(Math.pow(1+r,tenureVal)-1);

let balance=loanVal;

let html="<b>Amortization Schedule</b><br><br>";

for(let i=1;i<=tenureVal;i++){

let interestVal=balance*r;
let principal=emi-interestVal;
balance=balance-principal;

html+=`
<div style="display:flex;justify-content:space-between;padding:6px 0;">
<span>${i}</span>
<span>₹${emi.toFixed(0)}</span>
<span>₹${interestVal.toFixed(0)}</span>
<span>₹${principal.toFixed(0)}</span>
</div>`;
}

document.getElementById("amortization").innerHTML=html;
}

function resetAll(){

document.getElementById("loan").value="";
document.getElementById("rate").value="";
document.getElementById("tenure").value="";

document.getElementById("emiResult").innerHTML=
"Enter loan details and click Calculate EMI";

document.getElementById("total").innerHTML="0";
document.getElementById("interest").innerHTML="0";
document.getElementById("flatPa").innerHTML="0";
document.getElementById("pm").innerHTML="0";
document.getElementById("amortization").innerHTML="";
}

</script>

</body>
</html>
