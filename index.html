<style>
:root{
--bg:#1A2849;
--text:#ffffff;
--btn:#ffffff;
--btnText:#1A2849;
--inputBg:#1A2849;
--border:#ffffff;
--emiColor:#FFD700;
}

body.light{
--bg:#ffffff;
--text:#1A2849;
--btn:#1A2849;
--btnText:#ffffff;
--inputBg:transparent;
--border:#1A2849;
--emiColor:#00AEEF;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:var(--bg);
color:var(--text);
}

/* OUTER BOARD */
.board{
max-width:420px;
margin:10px auto;
border:3px solid var(--border);
border-radius:16px;
padding:12px;
box-sizing:border-box;
width:calc(100% - 12px);
}

/* HEADER */
.header{
position:sticky;
top:0;
z-index:999;
background:var(--bg);
padding-top:2px;
padding-bottom:6px;
margin-bottom:6px;
border-bottom:1px solid rgba(255,255,255,0.2);
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-size:20px;
font-weight:bold;
white-space:nowrap;
}

/* SWITCH */
.switch{
position:relative;
width:64px;
height:26px;
}

.switch input{ display:none; }

.slider{
position:absolute;
width:100%;
height:100%;
background:var(--btn);
border-radius:20px;
display:flex;
align-items:center;
font-size:10px;
font-weight:bold;
color:var(--btnText);
padding-left:24px;
box-sizing:border-box;
}

.slider:before{
content:"";
position:absolute;
height:18px;
width:18px;
left:4px;
background:var(--bg);
border-radius:50%;
transition:.3s;
}

.switch input:checked + .slider{
padding-left:6px;
}

.switch input:checked + .slider:before{
transform:translateX(34px);
}

/* RATE TOGGLE */
.rate-toggle{
display:flex;
gap:6px;
margin:6px 0 8px 0;
}

.rate-toggle button{
flex:1;
padding:7px;
border-radius:8px;
border:2px solid var(--border);
background:transparent;
color:var(--text);
font-weight:bold;
font-size:12px;
cursor:pointer;
}

.rate-toggle button.active{
background:var(--btn);
color:var(--btnText);
}

/* INPUT ROWS */
.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:6px 0;
font-size:14px;
}

.row input{
width:130px;
padding:6px;
border-radius:6px;
border:2px solid var(--border);
background:var(--inputBg);
color:var(--text);
text-align:right;
font-size:14px;
}

/* BUTTON ROW */
.btn-row{
display:flex;
gap:5px;
margin-top:6px;
}

.btn-row button{
flex:1;
padding:7px 4px;
background:var(--btn);
color:var(--btnText);
border:none;
font-size:10px;
font-weight:bold;
border-radius:7px;
cursor:pointer;
}

/* RESULT */
.result{
text-align:center;
margin-top:8px;
font-size:18px;
}

.result.highlight{
color:var(--emiColor);
font-weight:bold;
}

/* INFO */
.info{
margin-top:6px;
line-height:20px;
font-size:13px;
}

/* AMORTIZATION */
.amortization{
margin-top:8px;
font-size:13px;
line-height:20px;
max-height:320px;
overflow-y:auto;
}

.amortization-header{
display:flex;
justify-content:space-between;
padding:4px 0;
font-weight:bold;
border-bottom:1px solid rgba(255,255,255,0.25);
margin-bottom:4px;
position:sticky;
top:0;
background:var(--bg);
}
</style>
