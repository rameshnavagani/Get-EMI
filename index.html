<!DOCTYPE html>
<html lang="en">
<head>

<title>EMI Calculator Online | Loan EMI Calculator 2026 India | Home Car Personal Loan EMI</title>

<meta name="description" content="Free EMI Calculator Online 2026 India. Calculate Loan EMI, Personal Loan EMI, Home Loan EMI, Car Loan EMI, Monthly Installment and Amortisation schedule instantly.">

<style>

:root{
--bg:#1A2E57;
--text:#ffffff;
--card:#1A2E57;
--border:#ffffff;
--btn:#ffffff;
--btnText:#1A2E57;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:var(--bg);
color:var(--text);
}

.container{
max-width:420px;
margin:auto;
padding:14px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,0.2);
padding-bottom:10px;
margin-bottom:15px;
}

.title{
font-size:26px;
font-weight:bold;
}

/* toggle */

.switch{
position:relative;
width:70px;
height:32px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
background:white;
border-radius:30px;
width:100%;
height:100%;
display:flex;
align-items:center;
padding-left:30px;
font-size:12px;
font-weight:bold;
color:#1A2E57;
}

.slider:before{
content:"";
position:absolute;
width:24px;
height:24px;
background:#1A2E57;
border-radius:50%;
left:4px;
}

.card{
border:2px solid rgba(255,255,255,0.6);
border-radius:26px;
padding:18px;
}

/* reducing flat toggle */

.mode-row{
display:flex;
gap:10px;
margin-bottom:15px;
}

.mode-btn{
flex:1;
padding:12px;
border-radius:30px;
border:2px solid rgba(255,255,255,0.7);
text-align:center;
font-weight:bold;
}

.mode-btn.active{
background:white;
color:#1A2E57;
}

/* inputs */

.row{
display:flex;
justify-content:space-between;
align-items:center;
margin:16px 0;
}

.row label{
font-size:18px;
}

.row input{
width:180px;
padding:12px;
border-radius:12px;
border:2px solid rgba(255,255,255,0.8);
background:transparent;
color:white;
font-size:16px;
}

/* buttons */

.btn-row{
display:flex;
gap:10px;
margin-top:15px;
}

.btn-row button{
flex:1;
padding:14px 8px;
border-radius:14px;
border:none;
background:white;
color:#1A2E57;
font-weight:bold;
font-size:13px;
}

/* result */

.result{
text-align:center;
font-size:24px;
margin-top:20px;
}

.info{
margin-top:12px;
font-size:16px;
line-height:26px;
}

.amortization{
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="title">EMI Calculator Online</div>

<label class="switch">
<input type="checkbox">
<span class="slider">Dark</span>
</label>
</div>

<div class="card">

<div class="mode-row">
<div class="mode-btn active">Reducing Rate</div>
<div class="mode-btn">Flat Rate</div>
</div>

<div class="row">
<label>Loan Amount</label>
<input type="number" id="loan">
</div>

<div class="row">
<label>Rate %</label>
<input type="number" id="rate">
</div>

<div class="row">
<label>Tenure (Months)</label>
<input type="number" id="tenure">
</div>

<div class="btn-row">
<button id="calcBtn">CALCULATE EMI</button>
<button id="chartBtn">AMORTIZATION CHART</button>
<button id="resetBtn">RESET</button>
</div>

<div class="result" id="emiResult">
Enter loan details and click Calculate EMI
</div>

<div class="info">
<div>Total Amount Paying : ₹ <span id="total">0</span></div>
<div>Total Interest Paying : ₹ <span id="interest">0</span></div>
<div>Effective Rate p.a (Flat) : <span id="flatPa">0</span>%</div>
<div>Effective Rate p.m : <span id="pm">0</span>%</div>
</div>

<div id="amortization" class="amortization"></div>

</div>
</div>

<script>

document.getElementById("calcBtn").addEventListener("click", calculateEMI);
document.getElementById("chartBtn").addEventListener("click", showAmortization);
document.getElementById("resetBtn").addEventListener("click", resetAll);

function calculateEMI(){

const loan = parseFloat(document.getElementById("loan").value);
const rate = parseFloat(document.getElementById("rate").value);
const tenure = parseFloat(document.getElementById("tenure").value);

if(!loan || !rate || !tenure){
document.getElementById("emiResult").innerHTML="Please enter all values";
return;
}

const r = rate/12/100;

const emi = loan*r*Math.pow(1+r,tenure)/(Math.pow(1+r,tenure)-1);

const total = emi*tenure;
const interest = total-loan;

const years = tenure/12;
const flatRate = (interest/(loan*years))*100;

document.getElementById("emiResult").innerHTML="Loan EMI is ₹ "+emi.toFixed(2);
document.getElementById("total").innerHTML=total.toFixed(2);
document.getElementById("interest").innerHTML=interest.toFixed(2);
document.getElementById("flatPa").innerHTML=flatRate.toFixed(2);
document.getElementById("pm").innerHTML=(r*100).toFixed(2);
}

function showAmortization(){

calculateEMI();

const loanVal=parseFloat(document.getElementById("loan").value);
const rateVal=parseFloat(document.getElementById("rate").value);
const tenureVal=parseFloat(document.getElementById("tenure").value);

if(!loanVal || !rateVal || !tenureVal) return;

const r=rateVal/12/100;
const emi=loanVal*r*Math.pow(1+r,tenureVal)/(Math.pow(1+r,tenureVal)-1);

let balance=loanVal;

let html="<b>Amortization Schedule</b><br><br>";

html+=`
<div style="display:flex;justify-content:space-between;font-weight:bold">
<span>Month</span>
<span>EMI</span>
<span>Interest</span>
<span>Principal</span>
</div>
`;

for(let i=1;i<=tenureVal;i++){

let interestVal=balance*r;
let principal=emi-interestVal;
balance=balance-principal;

html+=`
<div style="display:flex;justify-content:space-between;padding:6px 0">
<span>${i}</span>
<span>₹${emi.toFixed(0)}</span>
<span>₹${interestVal.toFixed(0)}</span>
<span>₹${principal.toFixed(0)}</span>
</div>`;
}

document.getElementById("amortization").innerHTML=html;
}

function resetAll(){

loan.value="";
rate.value="";
tenure.value="";

emiResult.innerHTML="Enter loan details and click Calculate EMI";

total.innerHTML="0";
interest.innerHTML="0";
flatPa.innerHTML="0";
pm.innerHTML="0";

amortization.innerHTML="";
}

</script>

</body>
</html>
