/* OUTER BOARD */
.board{
max-width:420px;
margin:18px auto;
border:3px solid var(--border);
border-radius:18px;
padding:15px;
box-sizing:border-box;
width:calc(100% - 16px);
}

/* FIXED HEADER */
.header{
position:sticky;
top:0;
z-index:999;
background:var(--bg);
padding-top:5px;
padding-bottom:12px;
margin-bottom:10px;
border-bottom:1px solid rgba(255,255,255,0.2);
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-size:24px;
font-weight:bold;
white-space:nowrap;
}

.switch{
position:relative;
width:74px;
height:30px;
}

.switch input{ display:none; }

.slider{
position:absolute;
width:100%;
height:100%;
background:var(--btn);
border-radius:20px;
display:flex;
align-items:center;
font-size:11px;
font-weight:bold;
color:var(--btnText);
padding-left:28px;
box-sizing:border-box;
}

.slider:before{
content:"";
position:absolute;
height:22px;
width:22px;
left:4px;
background:var(--bg);
border-radius:50%;
transition:.3s;
}

.switch input:checked + .slider{
padding-left:8px;
}

.switch input:checked + .slider:before{
transform:translateX(40px);
}

/* RATE TOGGLE */
.rate-toggle{
display:flex;
gap:10px;
margin:12px 0 15px 0;
}

.rate-toggle button{

.rate-toggle button.active{

}

.row{

<div class="rate-toggle">
<button id="reducingBtn" class="active">Reducing Rate</button>
<button id="flatBtn">Flat Rate</button>
</div>

<div class="row">
<label>Loan Amount</label>
<input type="number" id="loan">
</div>

<div class="row">
<label>Rate %</label>
<input type="number" id="rate">
</div>

<div class="row">
<label>Tenure (Months)</label>
<input type="number" id="tenure">
</div>

<div class="btn-row">
<button id="calcBtn">CALCULATE EMI</button>
<button id="chartBtn">AMORTIZATION CHART</button>
<button id="resetBtn">RESET</button>
</div>

<div class="result" id="emiResult">
Enter loan details and click Calculate EMI
</div>

<div class="info">
<div>Total Amount Paying : ₹ <span id="total">0</span></div>
<div>Total Interest Paying : ₹ <span id="interest">0</span></div>
<div>Effective Rate p.a (Flat) : <span id="flatPa">0</span>%</div>
<div>Effective Rate p.m : <span id="pm">0</span>%</div>
</div>

<div id="amortization" class="amortization"></div>

</div>

<script>

let rateMode="reducing";

document.addEventListener("DOMContentLoaded", function(){

calcBtn.onclick=calculateEMI;
chartBtn.onclick=showAmortization;
resetBtn.onclick=resetAll;
modeToggle.onchange=toggleMode;

reducingBtn.onclick=()=>{
rateMode="reducing";
setActive();
}

flatBtn.onclick=()=>{
rateMode="flat";
setActive();
}

});

function setActive(){
reducingBtn.classList.toggle("active",rateMode==="reducing");
flatBtn.classList.toggle("active",rateMode==="flat");
}

function toggleMode(){
document.body.classList.toggle("light");
modeText.innerHTML =
document.body.classList.contains("light") ? "Light" : "Dark";
}

function calculateEMI(){

const loan = parseFloat(loanEl().value);
const rate = parseFloat(rateEl().value);
const tenure = parseFloat(tenureEl().value);

if(!loan || !rate || !tenure){
emiResult.classList.remove("highlight");
emiResult.innerHTML="Please enter all values";
return;
}

let emi,total,interest,flatRate;

if(rateMode==="reducing"){

const r = rate/12/100;

emi = loan*r*Math.pow(1+r,tenure)/(Math.pow(1+r,tenure)-1);

total = emi*tenure;
interest = total-loan;

flatRate = (interest/(loan*(tenure/12)))*100;

pm.innerHTML=(r*100).toFixed(2);

}
else{

const interestTotal = loan*(rate/100)*(tenure/12);

total = loan+interestTotal;
emi = total/tenure;
interest = interestTotal;

flatRate = rate;

pm.innerHTML=(rate/12).toFixed(2);

}

emiResult.classList.add("highlight");
emiResult.innerHTML="Loan EMI is ₹ "+emi.toFixed(2);

totalEl().innerHTML=total.toFixed(2);
interestEl().innerHTML=interest.toFixed(2);
flatPa.innerHTML=flatRate.toFixed(2);

}

function showAmortization(){

if(rateMode==="flat"){
amortization.innerHTML="Amortization available only for reducing rate";
return;
}

calculateEMI();

const loanVal=parseFloat(loanEl().value);
const rateVal=parseFloat(rateEl().value);
const tenureVal=parseFloat(tenureEl().value);

const r=rateVal/12/100;
const emi=loanVal*r*Math.pow(1+r,tenureVal)/(Math.pow(1+r,tenureVal)-1);

let balance=loanVal;

let html="<b>Amortization Schedule</b><br><br>";

html+=`
<div class="amortization-header">
<span>Month</span>
<span>EMI</span>
<span>Interest</span>
<span>Principal</span>
</div>
`;

for(let i=1;i<=tenureVal;i++){

let interestVal=balance*r;
let principal=emi-interestVal;
balance-=principal;

html+=`
<div style="display:flex;justify-content:space-between;padding:6px 0;">
<span>${i}</span>
<span>₹${emi.toFixed(0)}</span>
<span>₹${interestVal.toFixed(0)}</span>
<span>₹${principal.toFixed(0)}</span>
</div>`;
}

amortization.innerHTML=html;
}

function resetAll(){
loanEl().value="";
rateEl().value="";
tenureEl().value="";
emiResult.classList.remove("highlight");
emiResult.innerHTML="Enter loan details and click Calculate EMI";
totalEl().innerHTML="0";
interestEl().innerHTML="0";
flatPa.innerHTML="0";
pm.innerHTML="0";
amortization.innerHTML="";
}

/* shortcuts */
function loanEl(){return document.getElementById("loan")}
function rateEl(){return document.getElementById("rate")}
function tenureEl(){return document.getElementById("tenure")}
function totalEl(){return document.getElementById("total")}
function interestEl(){return document.getElementById("interest")}

</script>

</body>

<p>Get EMI is a free EMI calculator India tool to calculate loan EMI instantly.</p>
