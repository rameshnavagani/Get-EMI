<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>EMI Calculator Online</title>

<style>
:root{
--bg:#1A2849;
--text:#ffffff;
--btn:#ffffff;
--btnText:#1A2849;
--inputBg:#1A2849;
--border:#ffffff;
}

body.light{
--bg:#ffffff;
--text:#1A2849;
--btn:#1A2849;
--btnText:#ffffff;
--inputBg:transparent;
--border:#1A2849;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
}

/* BOARD */
.board{
max-width:450px;
margin:12px auto;
border:3px solid var(--border);
border-radius:18px;
height:92vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* SCROLL AREA */
.content{
overflow-y:auto;
padding:15px;
}

/* HEADER */
.header{
position:sticky;
top:0;
background:var(--bg);
z-index:100;
display:flex;
justify-content:space-between;
align-items:center;
padding-bottom:10px;
border-bottom:1px solid rgba(255,255,255,0.2);
}

.title{
font-size:24px;
font-weight:bold;
}

/* toggle */
.switch{
position:relative;
width:74px;
height:30px;
}
.switch input{display:none;}

.slider{
position:absolute;
width:100%;
height:100%;
background:var(--btn);
border-radius:20px;
display:flex;
align-items:center;
font-size:11px;
font-weight:bold;
color:var(--btnText);
padding-left:28px;
}

.slider:before{
content:"";
position:absolute;
height:22px;
width:22px;
left:4px;
background:var(--bg);
border-radius:50%;
transition:.3s;
}

.switch input:checked + .slider{
padding-left:8px;
}

.switch input:checked + .slider:before{
transform:translateX(40px);
}

.rate-toggle{
display:flex;
gap:10px;
margin:15px 0;
}

.rate-toggle button{
flex:1;
padding:12px;
border-radius:12px;
border:2px solid var(--border);
background:transparent;
color:var(--text);
font-weight:bold;
}

.rate-toggle .active{
background:var(--btn);
color:var(--btnText);
}

.row{
display:flex;
justify-content:space-between;
padding:12px 0;
}

.row input{
width:170px;
padding:10px;
border-radius:8px;
border:2px solid var(--border);
background:var(--inputBg);
color:var(--text);
text-align:right;
}

.btn-row{
display:flex;
gap:10px;
margin-top:10px;
}

.btn-row button{
flex:1;
padding:14px;
background:var(--btn);
color:var(--btnText);
border:none;
border-radius:10px;
font-weight:bold;
}

.result{
text-align:center;
margin-top:15px;
font-size:22px;
}

.info{
margin-top:10px;
line-height:24px;
}

/* AMORTIZATION */
.amortization-box{
margin-top:15px;
display:none;
}

.amort-header{
position:sticky;
top:50px;
background:var(--bg);
z-index:50;
}

.amort-head{
display:flex;
justify-content:space-between;
border-bottom:1px solid rgba(255,255,255,.2);
padding:8px 0;
font-weight:bold;
position:sticky;
top:80px;
background:var(--bg);
}

.amort-body{
max-height:300px;
overflow-y:auto;
}
</style>
</head>

<body>

<div class="board">

<div class="content">

<div class="header">
<div class="title">EMI Calculator Online</div>

<label class="switch">
<input type="checkbox" id="modeToggle">
<span class="slider" id="modeText">Dark</span>
</label>
</div>

<div class="rate-toggle">
<button id="reducingBtn" class="active">Reducing Rate</button>
<button id="flatBtn">Flat Rate</button>
</div>

<div class="row">
<label>Loan Amount</label>
<input type="number" id="loan">
</div>

<div class="row">
<label>Rate %</label>
<input type="number" id="rate">
</div>

<div class="row">
<label>Tenure (Months)</label>
<input type="number" id="tenure">
</div>

<div class="btn-row">
<button id="calcBtn">CALCULATE EMI</button>
<button id="chartBtn">AMORTIZATION CHART</button>
<button id="resetBtn">RESET</button>
</div>

<div class="result" id="emiResult"></div>

<div class="info">
<div>Total Amount Paying : ₹ <span id="total">0</span></div>
<div>Total Interest Paying : ₹ <span id="interest">0</span></div>
<div>Effective Rate p.a (Flat) : <span id="flatPa">0</span>%</div>
<div>Effective Rate p.m : <span id="pm">0</span>%</div>
</div>

<div class="amortization-box" id="amortBox">

<div class="amort-header">
<b>Amortization Schedule</b>
</div>

<div class="amort-head">
<span>Month</span>
<span>EMI</span>
<span>Interest</span>
<span>Principal</span>
</div>

<div id="amortBody" class="amort-body"></div>

</div>

</div>
</div>

<script>

let rateMode="reducing";

calcBtn.onclick=calculateEMI;
chartBtn.onclick=showAmortization;
resetBtn.onclick=resetAll;
modeToggle.onchange=toggleMode;

reducingBtn.onclick=()=>{
rateMode="reducing";
setActive();
}

flatBtn.onclick=()=>{
rateMode="flat";
setActive();
}

function setActive(){
reducingBtn.classList.toggle("active",rateMode==="reducing");
flatBtn.classList.toggle("active",rateMode==="flat");
}

function toggleMode(){
document.body.classList.toggle("light");
modeText.innerHTML=
document.body.classList.contains("light")?"Light":"Dark";
}

function calculateEMI(){

const loan=parseFloat(loan.value);
const rate=parseFloat(rateEl.value);
const tenure=parseFloat(tenureEl.value);

const r=rate/12/100;

const emi=loan*r*Math.pow(1+r,tenure)/(Math.pow(1+r,tenure)-1);

const total=emi*tenure;
const interest=total-loan;

emiResult.innerHTML="Loan EMI is ₹ "+emi.toFixed(2);
total.innerHTML=total.toFixed(2);
interest.innerHTML=interest.toFixed(2);
pm.innerHTML=(r*100).toFixed(2);
flatPa.innerHTML=((interest/(loan*(tenure/12)))*100).toFixed(2);

}

function showAmortization(){

calculateEMI();

const loan=parseFloat(loanEl.value);
const rate=parseFloat(rateEl.value);
const tenure=parseFloat(tenureEl.value);

const r=rate/12/100;
const emi=loan*r*Math.pow(1+r,tenure)/(Math.pow(1+r,tenure)-1);

let balance=loan;
let html="";

for(let i=1;i<=tenure;i++){

let interest=balance*r;
let principal=emi-interest;
balance-=principal;

html+=`
<div style="display:flex;justify-content:space-between;padding:6px 0;">
<span>${i}</span>
<span>₹${emi.toFixed(0)}</span>
<span>₹${interest.toFixed(0)}</span>
<span>₹${principal.toFixed(0)}</span>
</div>`;
}

amortBody.innerHTML=html;
amortBox.style.display="block";

}

function resetAll(){
location.reload();
}

</script>

</body>
</html>
